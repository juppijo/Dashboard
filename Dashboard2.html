<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Starboard</title>
    <link rel="stylesheet" href="https://openweathermap.org/themes/openweathermap/assets/vendor/owm/css/style.min.css">

    <style>
        /* CSS VARIABLEN FÜR THEMES */
        :root[data-theme="light"] {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
            --accent-color: #3498db;
        }

        :root[data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            transition: all 0.3s ease;
        }

        /* LAYOUT */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            grid-gap: 20px;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: var(--accent-color);
            color: white;
            font-weight: bold;
        }

        /* WIDGET SPEZIFISCH */
        #clock {
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            justify-content: center;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        .placeholder {
            text-align: center;
            color: #888;
            border: 2px dashed #555;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="dashboard" id="dashboard">
        <div class="card">
            <h3>Aktuelle Zeit</h3>
            <div id="clock">00:00:00</div>
        </div>

        <div class="card">
            <h3>Google Kalender</h3>
            <div class="placeholder"><iframe src="https://calendar.google.com/calendar/embed?src=juppi.jo%40gmail.com&ctz=Europe%2FBrussels" style="border: 0" width="800" height="600" frameborder="0" scrolling="no"></div>
        </div>

        <div class="card" style="grid-row: span 2;">
            <h3>Wetter (Lontzen)</h3>
            <div id="openweathermap-widget-5"></div>
        </div>

        <div class="card">
            <h3>Aufgaben</h3>
            <ul id="task-list">
                <li>Projekt starten</li>
                <li>Dashboard anpassen</li>
            </ul>
        </div>

        <div class="card">
            <h3>Notizen</h3>
            <div class="placeholder"><iframe src="https://keep.google.com" width="100%" height="500px"></iframe></div>
        </div>

        <div class="card">
            <h3>Google Keep</h3>
            <div style="text-align: center; padding: 20px;">
                <a href="https://keep.google.com" target="_blank" style="color: var(--accent-color); text-decoration: none;">Öffne Google Keep ↗</a>
            </div>
        </div>

        <div class="card">
            <h3>Dia-Show</h3>
            <img id="slideshow" src="https://picsum.photos/400/300" alt="Random Image" style="width:100%; border-radius:10px;">
        </div>
    </div>

    <div class="controls">
        <button onclick="toggleTheme()">Dark/Light</button>
        <button onclick="toggleFullscreen()">Vollbild</button>
    </div>

    <script>
        // --- WETTER CONFIG 1 ---
          window.myWidgetParam ? window.myWidgetParam : window.myWidgetParam = [];
          window.myWidgetParam.push({
            id: 5,
            cityid: '2792119',
            appid: '995838237b169caecad49f5f0db3cef3',
            units: 'metric',
            containerid: 'openweathermap-widget-5',
          });
          (function() {
            var script = document.createElement('script');
            script.async = true;
            script.charset = "utf-8";
            script.src = "//openweathermap.org/themes/openweathermap/assets/vendor/owm/js/weather-widget-generator-2.0.js";
            var s = document.getElementsByTagName('script')[0];
            s.parentNode.insertBefore(script, s);
          })();


        // --- WETTER CONFIG 2 ---
        window.myWidgetParam ? window.myWidgetParam : window.myWidgetParam = [];
        window.myWidgetParam.push({
            id: 1, 
            cityid: '2792119', 
            appid: '995838237b169caecad49f5f0db3cef3',
            units: 'metric', 
            containerid: 'openweathermap-widget-1',
        });
        (function() {
            var script = document.createElement('script');
            script.async = true; 
            script.charset = "utf-8";
            script.src = "https://openweathermap.org/themes/openweathermap/assets/vendor/owm/js/weather-widget-generator-2.0.js";
            var s = document.getElementsByTagName('script')[0];
            s.parentNode.insertBefore(script, s);
        })();

        // 1. UHR LOGIK
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('de-DE');
            document.getElementById('clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. THEME WECHSEL
        function toggleTheme() {
            const root = document.documentElement;
            const currentTheme = root.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            root.setAttribute('data-theme', newTheme);
        }

        // 3. VOLLBILD MODUS
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // --- TASKS ---
        function addTask() {
            const input = document.getElementById('task-input');
            if (input.value === '') return;
            const container = document.getElementById('task-container');
            const div = document.createElement('div');
            div.className = 'task-item';
            div.innerHTML = `<span>${input.value}</span><span class="delete-btn" onclick="this.parentElement.remove()">✕</span>`;
            container.appendChild(div);
            input.value = '';
        }

        // 4. EINFACHE DIA-SHOW (Beispiel)
        setInterval(() => {
            const img = document.getElementById('slideshow');
            img.src = "https://picsum.photos/400/300?random=" + Math.random();
        }, 10000); // Alle 10 Sek ein neues Bild
    </script>
</body>
</html>
