<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS FORGE — Visual CSS Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css-editor.css">
</head>
<body class="dark">

  <!-- Hidden file input for CSS loading -->
  <input type="file" id="fileInput" accept=".css">

  <!-- ═══════════════ HEADER ═══════════════ -->
  <header id="appHeader">

    <div class="logo">
      <svg class="logo-hex" viewBox="0 0 44 50" xmlns="http://www.w3.org/2000/svg">
        <polygon points="22,2 42,13 42,37 22,48 2,37 2,13" fill="none" stroke="currentColor" stroke-width="2.5"/>
        <text x="50%" y="52%" dominant-baseline="central" text-anchor="middle"
              font-size="20" font-weight="900" font-family="Orbitron" fill="currentColor">C</text>
      </svg>
      <div class="logo-text">CSS<span class="logo-accent">FORGE</span></div>
    </div>

    <!-- Element selector -->
    <nav class="el-nav" id="elementNav">
      <span class="nav-chip">ELEM</span>
      <button class="el-btn active" data-el="box">BOX</button>
      <button class="el-btn" data-el="button">BTN</button>
      <button class="el-btn" data-el="input">INPUT</button>
      <button class="el-btn" data-el="link">LINK</button>
      <button class="el-btn" data-el="text">TEXT</button>
      <button class="el-btn" data-el="card">CARD</button>
      <button class="el-btn" data-el="badge">BADGE</button>
      <button class="el-btn" data-el="image">IMG</button>
    </nav>

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="tbtn tbtn-text" id="btnLoad" title="CSS-Datei laden">
        <svg viewBox="0 0 20 20"><path d="M10 13V4m0 9-3-3m3 3 3-3M3 16h14"/></svg>
        Laden
      </button>
      <button class="tbtn tbtn-text" id="btnSave" title="Als .css speichern">
        <svg viewBox="0 0 20 20"><path d="M5 13V16h10v-3M10 3v9m0-9-3 3m3-3 3 3"/></svg>
        Speichern
      </button>
      <button class="tbtn tbtn-text" id="btnCopy" title="CSS kopieren">
        <svg viewBox="0 0 20 20"><rect x="7" y="7" width="10" height="10" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M3 13V3h10"/></svg>
        Kopieren
      </button>
      <button class="tbtn tbtn-text" id="btnGallery" title="Komponenten-Galerie öffnen" onclick="window.open('css-preview.html','_blank')">
        <svg viewBox="0 0 20 20"><rect x="2" y="2" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="11" y="2" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="2" y="11" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="11" y="11" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
        Galerie
      </button>
      <button class="tbtn tbtn-text" id="btnReset" title="Alle Werte zurücksetzen">
        <svg viewBox="0 0 20 20"><path d="M4 4v5h5M16 16v-5h-5M4 9a8 8 0 0 1 13.7-5.7M16 11a8 8 0 0 1-13.7 5.7"/></svg>
        Reset
      </button>
      <div class="sep"></div>
      <button class="tbtn tbtn-icon" id="btnTheme" title="Dunkel/Hell wechseln">
        <svg class="icon-sun" viewBox="0 0 20 20"><circle cx="10" cy="10" r="4" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.3 3.3l1.4 1.4M15.3 15.3l1.4 1.4M3.3 16.7l1.4-1.4M15.3 4.7l1.4-1.4"/></svg>
        <svg class="icon-moon" viewBox="0 0 20 20"><path d="M17.5 12.5A7.5 7.5 0 0 1 7.5 2.5a7.5 7.5 0 1 0 10 10z" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
      </button>
      <button class="tbtn tbtn-icon" id="btnFS" title="Vollbild">
        <svg class="icon-expand" viewBox="0 0 20 20"><path d="M3 3h5M3 3v5M17 3h-5M17 3v5M3 17h5M3 17v-5M17 17h-5M17 17v-5"/></svg>
        <svg class="icon-compress" viewBox="0 0 20 20"><path d="M8 3v5H3M12 3v5h5M8 17v-5H3M12 17v-5h5"/></svg>
      </button>
    </div>

  </header>

  <!-- ═══════════════ WORKSPACE ═══════════════ -->
  <div id="workspace">

    <!-- LEFT: Controls Panel -->
    <aside id="leftPanel">

      <div id="tabBar">
        <button class="tab active" data-tab="layout">Layout</button>
        <button class="tab" data-tab="typography">Typo</button>
        <button class="tab" data-tab="colors">Farben</button>
        <button class="tab" data-tab="border">Border</button>
        <button class="tab" data-tab="shadow">Shadow</button>
        <button class="tab" data-tab="effects">Effekte</button>
      </div>

      <div id="controlsArea"></div>

    </aside>

    <!-- VERTICAL RESIZE HANDLE (left ↔ right) -->
    <div id="resizeV" class="resize-handle resize-handle-v" title="Ziehen zum Vergrößern"></div>

    <!-- RIGHT: Preview + Code -->
    <div id="rightPanel">

      <!-- Preview -->
      <div id="previewPane">
        <div class="pane-header">
          <div class="pane-title">
            <span class="pane-icon">◈</span> VORSCHAU
            <span class="live-dot" id="liveDot"></span>
          </div>
          <div class="pane-controls">
            <div class="bg-swatches">
              <button class="swatch active" data-bg="check" title="Kariertes Muster"></button>
              <button class="swatch" data-bg="dark"  title="Dunkel"></button>
              <button class="swatch" data-bg="mid"   title="Mittelgrau"></button>
              <button class="swatch" data-bg="light" title="Hell"></button>
              <button class="swatch" data-bg="white" title="Weiß"></button>
              <button class="swatch" data-bg="grad"  title="Gradient"></button>
            </div>
            <label class="hover-toggle">
              <input type="checkbox" id="hoverSim">
              <span class="hover-label">:hover</span>
            </label>
          </div>
        </div>
        <div id="previewBox" class="bg-check">
          <div id="previewWrap">
            <div id="previewEl">Beispiel Element</div>
          </div>
        </div>
      </div>

      <!-- HORIZONTAL RESIZE HANDLE (preview ↕ code) -->
      <div id="resizeH" class="resize-handle resize-handle-h" title="Ziehen zum Vergrößern"></div>

      <!-- Code Output -->
      <div id="codePane">
        <div class="pane-header">
          <div class="pane-title">
            <span class="pane-icon">◈</span> CSS CODE
          </div>
          <div class="pane-controls">
            <span class="sel-label">Selektor:</span>
            <input type="text" class="selector-input" id="selectorInput" value=".mein-element" spellcheck="false">
            <button class="mini-btn active" id="btnAutoSync" title="Automatische Synchronisation">⟳ Auto</button>
            <button class="mini-btn" id="btnFormat" title="CSS formatieren &amp; synchronisieren">⊞ Format</button>
          </div>
        </div>
        <div class="code-area">
          <textarea id="cssCode" spellcheck="false" autocorrect="off"
                    autocomplete="off" autocapitalize="off"></textarea>
        </div>
      </div>

    </div><!-- /#rightPanel -->
  </div><!-- /#workspace -->

  <!-- Toast notification -->
  <div id="toast"></div>

  <script src="css-editor.js"></script>
</body>
</html>
