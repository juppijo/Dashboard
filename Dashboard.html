<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profi Starboard</title>
    <link rel="stylesheet" href="https://openweathermap.org/themes/openweathermap/assets/vendor/owm/css/style.min.css">

    <style>
        :root[data-theme="light"] {
            --bg-color: #eef2f3;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --accent-color: #3498db;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        :root[data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f5f5f5;
            --accent-color: #e74c3c;
            --shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            transition: background 0.3s ease;
            overflow-x: hidden;
        }

        /* GRID SYSTEM */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            grid-auto-rows: minmax(200px, auto);
            gap: 20px;
            padding: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); }

        h3 { margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 1.1rem; }

        /* WIDGETS */
        #clock { font-size: 3.5rem; font-weight: bold; text-align: center; margin: auto; color: var(--accent-color); }
        
        iframe { border: none; width: 100%; height: 300px; border-radius: 10px; }

        /* TASKS */
        #task-input { background: #333; border: none; color: white; padding: 8px; border-radius: 5px; width: 70%; }
        .task-item { display: flex; justify-content: space-between; margin-top: 10px; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 5px; }
        .delete-btn { color: #ff4d4d; cursor: pointer; font-weight: bold; }

        /* STEUERUNG */
        .controls { position: fixed; top: 10px; right: 20px; z-index: 1000; }
        button { 
            background: var(--card-bg); color: var(--text-color); border: 1px solid var(--accent-color);
            padding: 8px 15px; border-radius: 20px; cursor: pointer; margin-left: 5px; font-weight: bold;
        }
        button:hover { background: var(--accent-color); color: white; }

    </style>
</head>
<body>

    <div class="controls">
        <button onclick="toggleTheme()">🌓 Mode</button>
        <button onclick="toggleFullscreen()">⛶ Vollbild</button>
    </div>

    <div class="dashboard">
        <div class="card">
            <h3>Zeit & Datum</h3>
            <div id="clock">00:00:00</div>
            <div id="date" style="text-align: center; opacity: 0.7;"></div>
        </div>

        <div class="card" style="grid-row: span 2;">
            <h3>Wetter (Lontzen)</h3>
            <div id="openweathermap-widget-5"></div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h3>Google Kalender</h3>
            <div style="background: #333; height: 100%; display: flex; align-items: center; justify-content: center; border-radius: 10px;">
                <p><i><iframe src="https://calendar.google.com/calendar/embed?src=juppi.jo%40gmail.com&ctz=Europe%2FBrussels" style="border: 0" width="800" height="600" frameborder="0" scrolling="no"></iframe></i></p>
            </div>
        </div>

        <div class="card">
            <h3>Aufgaben</h3>
            <div>
                <input type="text" id="task-input" placeholder="Neue Aufgabe...">
                <button onclick="addTask()">+</button>
            </div>
            <div id="task-container" style="margin-top: 15px;"></div>
        </div>

        <div class="card">
            <h3>Google Keep</h3>
            <div style="text-align: center; padding: 20px;">
                <a href="https://keep.google.com" target="_blank" style="color: var(--accent-color); text-decoration: none;">Öffne Google Keep ↗</a>
            </div>
        </div>

        <div class="card">
            <h3>Inspiration</h3>
            <img id="slideshow" src="https://picsum.photos/600/400" alt="Dia" style="width:100%; height: 150px; object-fit: cover; border-radius: 10px;">
        </div>
    </div>

    <script src="https://unpkg.com/d3@7.8.5/dist/d3.min.js"></script>
    <script>

        // --- WETTER CONFIG 1 ---
          window.myWidgetParam ? window.myWidgetParam : window.myWidgetParam = [];
          window.myWidgetParam.push({
            id: 5,
            cityid: '2792119',
            appid: '995838237b169caecad49f5f0db3cef3',
            units: 'metric',
            containerid: 'openweathermap-widget-5',
          });
          (function() {
            var script = document.createElement('script');
            script.async = true;
            script.charset = "utf-8";
            script.src = "//openweathermap.org/themes/openweathermap/assets/vendor/owm/js/weather-widget-generator-2.0.js";
            var s = document.getElementsByTagName('script')[0];
            s.parentNode.insertBefore(script, s);
          })();


        // --- WETTER CONFIG 2 ---
        window.myWidgetParam ? window.myWidgetParam : window.myWidgetParam = [];
        window.myWidgetParam.push({
            id: 1, 
            cityid: '2792119', 
            appid: '995838237b169caecad49f5f0db3cef3',
            units: 'metric', 
            containerid: 'openweathermap-widget-1',
        });
        (function() {
            var script = document.createElement('script');
            script.async = true; 
            script.charset = "utf-8";
            script.src = "https://openweathermap.org/themes/openweathermap/assets/vendor/owm/js/weather-widget-generator-2.0.js";
            var s = document.getElementsByTagName('script')[0];
            s.parentNode.insertBefore(script, s);
        })();

        // --- UHR ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('de-DE');
            document.getElementById('date').textContent = now.toLocaleDateString('de-DE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- THEME ---
        function toggleTheme() {
            const root = document.documentElement;
            root.setAttribute('data-theme', root.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }

        // --- VOLLBILD ---
        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        // --- TASKS ---
        function addTask() {
            const input = document.getElementById('task-input');
            if (input.value === '') return;
            const container = document.getElementById('task-container');
            const div = document.createElement('div');
            div.className = 'task-item';
            div.innerHTML = `<span>${input.value}</span><span class="delete-btn" onclick="this.parentElement.remove()">✕</span>`;
            container.appendChild(div);
            input.value = '';
        }

        // --- DIA SHOW ---
        setInterval(() => {
            document.getElementById('slideshow').src = "https://picsum.photos/600/400?random=" + Math.random();
        }, 15000);
    </script>
</body>
</html>
