<!DOCTYPE html>
<html lang="de" data-theme="cosmos" data-mode="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>◈ Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ╔══════════════ TOPBAR ══════════════╗ -->
<header id="topbar">
  <div class="bar-left">
    <span class="logo">◈ DASHBOARD</span>
    <span id="dateDisplay" class="top-date"></span>
  </div>
  <div class="bar-right">
    <button class="ctrl-btn" id="btnSettings" title="Einstellungen">⚙</button>
    <button class="ctrl-btn" id="btnTheme"    title="Theme">◑</button>
    <button class="ctrl-btn" id="btnMode"     title="Hell / Dunkel">☀</button>
    <button class="ctrl-btn" id="btnFullscreen" title="Vollbild">⛶</button>
  </div>
</header>

<!-- ╔══════════════ GRID (free-form) ══════════════╗ -->
<main id="grid">

  <!-- 1 · UHR -->
  <article class="card" id="cardClock">
    <div class="card-label">Uhr</div>
    <div class="clock-body">
      <canvas id="analogClock" width="160" height="160"></canvas>
      <div id="digitalClock" class="digital"></div>
    </div>
    <div class="resize-handle" data-id="cardClock"></div>
  </article>

  <!-- 2 · WETTER (OWM Widget) -->
  <article class="card" id="cardWeather">
    <div class="card-label">Wetter</div>
    <div id="owmWrapper">
      <link rel="stylesheet" href="//openweathermap.org/themes/openweathermap/assets/vendor/owm/css/style.min.css" />
      <div id="openweathermap-widget-5"></div>
    </div>
    <div class="resize-handle" data-id="cardWeather"></div>
  </article>

  <!-- 3 · DIASCHAU -->
  <article class="card" id="cardSlide">
    <div class="card-label">Diaschau</div>
    <div id="slideArea">
      <div id="slideFrame">
        <img id="slideImg" src="" alt="" />
        <div id="slideCap"></div>
      </div>
      <div id="slideBar">
        <button class="sbtn" id="sPrev">&#8249;</button>
        <span id="sCnt">0 / 0</span>
        <button class="sbtn" id="sNext">&#8250;</button>
        <button class="sbtn" id="sPlay" title="Autoplay">&#9654;</button>
        <button class="sbtn" id="sDel"  title="Bild löschen">🗑</button>
        <label class="upload-lbl" title="Bilder laden">
          ＋<input type="file" id="sInput" accept="image/*" multiple hidden />
        </label>
      </div>
    </div>
    <div id="slideEmpty">Bilder über <strong>＋</strong> hinzufügen</div>
    <div class="resize-handle" data-id="cardSlide"></div>
  </article>

  <!-- 4 · KALENDER -->
  <article class="card" id="cardCal">
    <div class="card-label">Google Kalender</div>
    <iframe
      id="calFrame"
      src="https://calendar.google.com/calendar/embed?src=juppi.jo%40gmail.com&ctz=Europe%2FBrussels&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&mode=AGENDA"
      frameborder="0" scrolling="no">
    </iframe>
    <div class="resize-handle" data-id="cardCal"></div>
  </article>

  <!-- 5 · AUFGABEN -->
  <article class="card" id="cardTasks">
    <div class="card-label">Aufgaben</div>
    <div id="tasksInner">
      <div class="task-row">
        <input id="taskInput" class="tinput" placeholder="Neue Aufgabe…" />
        <button id="taskAdd" class="tadd-btn">+</button>
      </div>
      <div id="taskList"></div>
    </div>
    <div class="resize-handle" data-id="cardTasks"></div>
  </article>

  <!-- 6 · GOOGLE KEEP -->
  <article class="card" id="Gkeep">
    <div class="card-label">Google Keep</div>
    <div style="text-align: center; padding: 20px;">
      <a href="https://keep.google.com" target="_blank" style="color: var(--ac); text-decoration: none;">Öffne Google Keep ↗</a>
    </div>
    <div class="resize-handle" data-id="Gkeep"></div>
  </article>

  <!-- 7 · NOTIZEN -->
  <article class="card" id="cardNotes">
    <div class="card-label">
      Notizen
      <button class="note-add-btn" id="btnAddNote" title="Neue Notiz">＋</button>
    </div>
    <div id="noteGrid"></div>
    <div class="resize-handle" data-id="cardNotes"></div>
  </article>

  <!-- 8 · SCHNELLINFO -->
  <article class="card" id="cardInfo">
    <div class="card-label">Info</div>
    <div id="infoList">
      <div class="info-row"><span class="info-lbl">Kalenderwoche</span><span id="iKW"></span></div>
      <div class="info-row"><span class="info-lbl">Tag des Jahres</span><span id="iDOY"></span></div>
      <div class="info-row"><span class="info-lbl">Sonnenaufgang</span><span id="iRise">—</span></div>
      <div class="info-row"><span class="info-lbl">Sonnenuntergang</span><span id="iSet">—</span></div>
    </div>
    <div class="resize-handle" data-id="cardInfo"></div>
  </article>

</main>

<!-- ╔══════════════ EINSTELLUNGEN MODAL ══════════════╗ -->
<div id="overlay" class="hidden"></div>
<div id="settingsModal" class="modal hidden">
  <div class="mbox">
    <div class="mtitle">⚙ Einstellungen</div>
    <label>Diaschau Intervall (Sekunden)
      <input type="number" id="cfgInterval" value="5" min="1" max="120" />
    </label>
    <label>OpenWeather Stadt-ID (für Schnellinfo)
      <input type="text" id="cfgCityId" placeholder="2792119" />
    </label>
    <label>OpenWeather API-Key (für Schnellinfo)
      <input type="text" id="cfgApiKey" placeholder="dein-key" />
    </label>
    <div class="mbtns">
      <button class="mbtn" id="cfgSave">Speichern</button>
      <button class="mbtn sec" id="cfgClose">Abbrechen</button>
      <button class="mbtn sec" id="cfgResetLayout" title="Karten auf Standard zurücksetzen">↺ Layout</button>
    </div>
  </div>
</div>

<!-- OWM Widget Script -->
<script>
  window.myWidgetParam = window.myWidgetParam || [];
  window.myWidgetParam.push({
    id: 5,
    cityid: '2792119',
    appid: '995838237b169caecad49f5f0db3cef3',
    units: 'metric',
    containerid: 'openweathermap-widget-5',
  });
  (function () {
    var sc = document.createElement('script');
    sc.async = true;
    sc.charset = 'utf-8';
    sc.src = "https://openweathermap.org/themes/openweathermap/assets/vendor/owm/js/weather-widget-generator-2.0.js";
    document.body.appendChild(sc);
  })();
</script>

<script src="app.js"></script>
</body>
</html>
